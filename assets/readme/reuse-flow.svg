<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300" role="img" aria-labelledby="title desc">
  <title id="title">Quiver turns proven prompts into reusable templates</title>
  <desc id="desc">Save a prompt that works, mark the parts that change as slots, then fill and reuse it anywhere.</desc>
  <rect width="1200" height="300" rx="28" fill="#dce8c8"/>

  <text x="600" y="64" text-anchor="middle" fill="#1f2a1c" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="34" font-weight="700">
    Your best prompts, <tspan fill="#a65324">ready to fly again.</tspan>
  </text>

  <g font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" text-anchor="middle">
    <rect x="70" y="112" width="280" height="116" rx="20" fill="#f1ead8" stroke="#779064" stroke-width="2"/>
    <text x="210" y="155" fill="#245e23" font-size="18" font-weight="700">SAVE WHAT WORKS</text>
    <text x="210" y="190" fill="#1f2a1c" font-size="20">A precise prompt</text>

    <path d="M370 170 H410" fill="none" stroke="#a65324" stroke-width="5" stroke-linecap="round"/>
    <path d="M402 159 L416 170 L402 181" fill="none" stroke="#a65324" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

    <rect x="430" y="112" width="340" height="116" rx="20" fill="#f1ead8" stroke="#779064" stroke-width="2"/>
    <text x="600" y="155" fill="#245e23" font-size="18" font-weight="700">MARK WHAT CHANGES</text>
    <text x="600" y="190" fill="#1f2a1c" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="20">{{topic}} · {{audience}}</text>

    <path d="M790 170 H830" fill="none" stroke="#a65324" stroke-width="5" stroke-linecap="round"/>
    <path d="M822 159 L836 170 L822 181" fill="none" stroke="#a65324" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>

    <rect x="850" y="112" width="280" height="116" rx="20" fill="#245e23"/>
    <text x="990" y="155" fill="#f6f0df" font-size="18" font-weight="700">FILL &amp; REUSE</text>
    <text x="990" y="190" fill="#f6f0df" font-size="20">In any AI chat</text>
  </g>

  <text x="600" y="270" text-anchor="middle" fill="#4c5e45" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, sans-serif" font-size="17">
    Local Markdown · one global hotkey · no account required
  </text>
</svg>
