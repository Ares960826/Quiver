name: Bug report
description: Report a reproducible problem in a public Quiver release
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: Before submitting, remove private prompts, personal paths and sensitive screenshots.
  - type: input
    id: version
    attributes:
      label: Quiver version
      placeholder: v0.1.0-preview.1
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - macOS Apple Silicon
        - macOS Intel
        - Other
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
